stages:
  - check
  - test

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

before_script:
  - apt-get update -qq && apt-get install -y -qq libssh2-1-dev libssl-dev pkg-config > /dev/null 2>&1 || true

fmt:
  stage: check
  image: rust:latest
  script:
    - rustup component add rustfmt
    - cargo fmt --check

clippy:
  stage: check
  image: rust:latest
  script:
    - rustup component add clippy
    - cargo clippy -- -D warnings

build:
  stage: check
  image: rust:latest
  script:
    - cargo build --release

test:
  stage: test
  image: rust:latest
  script:
    - cargo test
